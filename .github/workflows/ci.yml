name: Industrial Monitor CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: machine_monitoring
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven

      - name: Run DB migrations
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=admin123 psql \
            -h localhost -U admin -d machine_monitoring \
            -f infra/init.sql

      - name: Build Spring Boot
        run: |
          cd backend/Industrialmonitor
          mvn clean package -DskipTests

      - name: Run tests
        run: |
          cd backend/Industrialmonitor
          mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/machine_monitoring
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin123
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Build Docker image
        run: |
          cd backend/Industrialmonitor
          docker build -t industrial-monitor:${{ github.sha }} .
          docker tag industrial-monitor:${{ github.sha }} industrial-monitor:latest

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag industrial-monitor:latest ${{ secrets.DOCKER_USERNAME }}/industrial-monitor:latest
          docker tag industrial-monitor:latest ${{ secrets.DOCKER_USERNAME }}/industrial-monitor:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/industrial-monitor:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/industrial-monitor:${{ github.sha }}

  build-simulator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd simulator
          pip install -r requirements.txt

      - name: Lint simulator
        run: |
          cd simulator
          python -m py_compile sensor_simulator.py
          python -m py_compile mqtt_publisher.py
          echo "Simulator syntax OK"

      - name: Build simulator Docker image
        run: |
          cd simulator
          docker build -t industrial-monitor-simulator:${{ github.sha }} .
          docker tag industrial-monitor-simulator:${{ github.sha }} industrial-monitor-simulator:latest

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push simulator Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag industrial-monitor-simulator:latest ${{ secrets.DOCKER_USERNAME }}/industrial-monitor-simulator:latest
          docker tag industrial-monitor-simulator:latest ${{ secrets.DOCKER_USERNAME }}/industrial-monitor-simulator:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/industrial-monitor-simulator:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/industrial-monitor-simulator:${{ github.sha }}
